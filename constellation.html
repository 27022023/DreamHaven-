<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dream Haven – Constellation Sky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --text-light: #f7f7ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body {
      background: radial-gradient(circle at top, #1a103d, #02000a);
      color: var(--text-light);
      min-height: 100vh;
    }
    .section { padding: 1rem 1.25rem 1.5rem; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .back-link { text-decoration: none; color: var(--text-light); font-size: 1.3rem; }
    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #skyCanvas {
      width: 100%;
      height: 60vh;
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      background: radial-gradient(circle at top, #2b1b5a, #05010f);
      display: block;
    }
    .star-label {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 0.5rem;
      min-height: 1.4rem;
    }
    .hint {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    @media (min-width: 768px) {
      .section { padding: 1.5rem 2.5rem 2rem; }
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="section-header">
      <a href="index.html" class="back-link">←</a>
      <span class="section-title">Constellation Sky</span>
    </div>

    <canvas id="skyCanvas"></canvas>
    <div class="star-label" id="starLabel">Tap a star to see its name 🌟</div>
    <p class="hint">
      Let your eyes rest on the night sky.✨
    </p>
  </section>

  <script>
    const skyCanvas = document.getElementById('skyCanvas');
    const starLabel = document.getElementById('starLabel');
    const ctx = skyCanvas.getContext('2d');

    const stars = [
      { name: 'Vega', x: 0.2, y: 0.3 },
      { name: 'Altair', x: 0.4, y: 0.5 },
      { name: 'Deneb', x: 0.6, y: 0.25 },
      { name: 'Sirius', x: 0.7, y: 0.6 },
      { name: 'Betelgeuse', x: 0.3, y: 0.7 },
      { name: 'Rigel', x: 0.5, y: 0.8 },
      { name: 'Polaris', x: 0.85, y: 0.2 }
    ];

    function resizeCanvas() {
      skyCanvas.width = skyCanvas.clientWidth;
      skyCanvas.height = skyCanvas.clientHeight;
      drawSky();
    }

    function drawSky() {
      const w = skyCanvas.width;
      const h = skyCanvas.height;
      ctx.clearRect(0, 0, w, h);

      const grad = ctx.createRadialGradient(w/2, 0, 0, w/2, h, h);
      grad.addColorStop(0, '#2b1b5a');
      grad.addColorStop(1, '#05010f');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const r = Math.random() * 1.2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      stars.forEach(s => {
        const x = s.x * w;
        const y = s.y * h;
        ctx.beginPath();
        ctx.fillStyle = '#ffe9a9';
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function handleStarClick(evt) {
      const rect = skyCanvas.getBoundingClientRect();
      const x = evt.clientX - rect.left;
      const y = evt.clientY - rect.top;
      const w = skyCanvas.width;
      const h = skyCanvas.height;

      let found = null;
      stars.forEach(s => {
        const sx = s.x * w;
        const sy = s.y * h;
        const dist = Math.hypot(x - sx, y - sy);
        if (dist < 10) found = s;
      });

      if (found) {
        starLabel.textContent = found.name + ' ✨';
      } else {
        starLabel.textContent = 'Tap a star to see its name 🌟';
      }
    }

    skyCanvas.addEventListener('click', handleStarClick);
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('load', resizeCanvas);
  </script>
</body>
</html>
