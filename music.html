<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dream Haven – Sleep Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #e8d8ff; /* pastel lavender */
      --card-bg: #f7f0ff;
      --accent: #c8a8ff;
      --text-dark: #2a1f3d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .section {
      padding: 1.5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .back-link {
      text-decoration: none;
      color: var(--text-dark);
      font-size: 1.8rem;
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      border: 2px solid var(--accent);
      box-shadow: 0 0 15px rgba(200, 168, 255, 0.4);
    }

    .card h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .track-item {
      padding: 1rem;
      border-radius: 1rem;
      background: white;
      border: 2px solid var(--accent);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    .track-item:hover {
      background: #f0e4ff;
    }

    .track-item.active {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }

    label {
      font-size: 1rem;
      margin-top: 1rem;
      display: block;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 0.8rem;
      border-radius: 1rem;
      border: 2px solid var(--accent);
      background: white;
      font-size: 1rem;
      margin-top: 0.3rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn {
      flex: 1;
      padding: 1rem;
      border-radius: 1rem;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #b38aff;
    }

    #musicStatus {
      margin-top: 1rem;
      font-size: 1rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <section class="section">
    <div class="section-header">
      <a href="index.html" class="back-link">←</a>
      <span class="section-title">Sleep Music</span>
    </div>

    <div class="card">
      <h3>Choose your sound</h3>

      <div class="track-list" id="trackList">
        <div class="track-item" data-src="https://cdn.pixabay.com/download/audio/2021/09/30/audio_4b4b4f3f4a.mp3?filename=soft-piano-ambient-110397.mp3">Soft Piano</div>
        <div class="track-item" data-src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_9f4f5c4b4b.mp3?filename=rain-ambience-6101.mp3">Rain Ambience</div>
        <div class="track-item" data-src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e8b4b4b4b.mp3?filename=ocean-waves.mp3">Ocean Waves</div>
        <div class="track-item" data-src="https://cdn.pixabay.com/download/audio/2021/09/01/audio_3f3f4b4b4b.mp3?filename=forest-night-ambient-11023.mp3">Forest Night</div>
        <div class="track-item" data-src="https://cdn.pixabay.com/download/audio/2022/01/12/audio_4b4b4b4b4b.mp3?filename=deep-sleep-frequency.mp3">Deep Sleep Frequencies</div>
      </div>

      <label for="durationSelect">Duration</label>
      <select id="durationSelect">
        <option value="600">10 minutes</option>
        <option value="1200">20 minutes</option>
        <option value="3600">1 hour</option>
        <option value="0">Custom</option>
      </select>

      <label for="customMinutes">Custom minutes</label>
      <input type="number" id="customMinutes" placeholder="e.g. 45" />

      <div class="buttons">
        <button class="btn" id="playMusicBtn">Play</button>
        <button class="btn" id="pauseMusicBtn">Pause</button>
      </div>

      <div id="musicStatus">No track selected</div>
    </div>

    <audio id="audio" preload="none"></audio>
  </section>

  <script>
    const audio = document.getElementById("audio");
    const trackList = document.getElementById("trackList");
    const playBtn = document.getElementById("playMusicBtn");
    const pauseBtn = document.getElementById("pauseMusicBtn");
    const durationSelect = document.getElementById("durationSelect");
    const customMinutes = document.getElementById("customMinutes");
    const musicStatus = document.getElementById("musicStatus");

    let currentTrack = null;
    let timer = null;

    trackList.addEventListener("click", (e) => {
      const item = e.target.closest(".track-item");
      if (!item) return;

      document.querySelectorAll(".track-item").forEach(t => t.classList.remove("active"));
      item.classList.add("active");

      currentTrack = item.dataset.src;
      audio.src = currentTrack;
      musicStatus.textContent = "Track selected: " + item.textContent;
    });

    playBtn.addEventListener("click", () => {
      if (!currentTrack) {
        musicStatus.textContent = "Please select a track first";
        return;
      }

      audio.play();
      musicStatus.textContent = "Playing…";

      if (timer) clearTimeout(timer);

      let seconds = parseInt(durationSelect.value);
      if (seconds === 0) {
        const custom = parseInt(customMinutes.value);
        if (!isNaN(custom)) seconds = custom * 60;
      }

      if (seconds > 0) {
        timer = setTimeout(() => {
          audio.pause();
          musicStatus.textContent = "Timer ended";
        }, seconds * 1000);
      }
    });

    pauseBtn.addEventListener("click", () => {
      audio.pause();
      musicStatus.textContent = "Paused";
      if (timer) clearTimeout(timer);
    });
  </script>
</body>
</html>
