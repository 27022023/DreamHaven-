<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dream Haven – Sleep Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #0a0f2d;
  --card: #1a224d;
  --accent: #c7a6ff;
  --text: #f5eaff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1.5rem;
}

.header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.back {
  font-size: 2rem;
  text-decoration: none;
  color: var(--text);
}

.title {
  font-size: 1.8rem;
  font-weight: 700;
}

.card {
  background: var(--card);
  padding: 1.5rem;
  border-radius: 1.5rem;
  border: 2px solid var(--accent);
  box-shadow: 0 0 20px rgba(199,166,255,0.3);
  margin-bottom: 1.5rem;
}

.sound-btn {
  width: 100%;
  padding: 1rem;
  margin-bottom: 0.8rem;
  font-size: 1.2rem;
  border-radius: 1rem;
  border: 2px solid var(--accent);
  background: #11183a;
  color: var(--text);
  cursor: pointer;
  transition: 0.2s;
}

.sound-btn.active {
  background: var(--accent);
  color: #000;
  font-weight: 700;
}

#timerDisplay {
  font-size: 2.2rem;
  text-align: center;
  margin: 1rem 0;
}

.big-btn {
  width: 100%;
  padding: 1rem;
  font-size: 1.3rem;
  border-radius: 1rem;
  border: none;
  background: var(--accent);
  color: #000;
  cursor: pointer;
  margin-top: 1rem;
  font-weight: 700;
}

.big-btn:hover {
  background: #b58aff;
}

.volume-slider {
  width: 100%;
  margin-top: 0.5rem;
}
</style>
</head>

<body>

<div class="header">
  <a href="index.html" class="back">←</a>
  <div class="title">Sleep Music</div>
</div>

<div class="card">

  <div id="timerDisplay">00:00</div>

  <label>Preset Timer</label>
  <div style="display:flex; gap:0.5rem; margin:0.5rem 0;">
    <button class="sound-btn" onclick="setTimer(5)">5 min</button>
    <button class="sound-btn" onclick="setTimer(10)">10 min</button>
    <button class="sound-btn" onclick="setTimer(20)">20 min</button>
  </div>

  <label>Custom Minutes</label>
  <input type="number" id="customMinutes" placeholder="e.g. 15"
         style="width:100%; padding:0.7rem; border-radius:1rem; border:2px solid var(--accent); background:#11183a; color:var(--text); margin-top:0.3rem;"
         oninput="applyCustom()">

</div>

<div class="card">
  <h3 style="margin-bottom:1rem;">Choose Sounds</h3>

  <button class="sound-btn" data-sound="rain">🌧️ Rain</button>
  <button class="sound-btn" data-sound="ocean">🌊 Ocean</button>
  <button class="sound-btn" data-sound="wind">🍃 Wind</button>
  <button class="sound-btn" data-sound="space">🪐 Space</button>

  <p style="margin-top:15px;">Volume</p>
  <input type="range" min="0" max="1" step="0.01" value="0.5"
         id="volumeSlider" class="volume-slider">

  <button id="startStopBtn" class="big-btn">Start</button>
</div>

<script src="js/audioEngine.js"></script>

<script>
/* ---------------- TIMER ---------------- */
let timerInterval = null;
let timeLeft = 0;

function setTimer(minutes) {
  timeLeft = minutes * 60;
  updateTimerDisplay();
}

function applyCustom() {
  const val = parseInt(document.getElementById("customMinutes").value);
  if (!isNaN(val) && val > 0) {
    setTimer(val);
  }
}

function updateTimerDisplay() {
  const mins = String(Math.floor(timeLeft / 60)).padStart(2, "0");
  const secs = String(timeLeft % 60).padStart(2, "0");
  document.getElementById("timerDisplay").textContent = `${mins}:${secs}`;
}

function startTimer() {
  if (timeLeft <= 0) return;

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      startStopBtn.click();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

/* ---------------- SESSION CONTROL ---------------- */
let running = false;

startStopBtn.addEventListener("click", () => {
  if (!running) {
    running = true;
    startStopBtn.textContent = "Stop";

    DreamHavenAudio.init();
    startTimer();

    document.querySelectorAll(".sound-btn.active").forEach(btn => {
      DreamHavenAudio.startSound(btn.dataset.sound);
    });

  } else {
    running = false;
    startStopBtn.textContent = "Start";

    stopTimer();
    DreamHavenAudio.stopAll();
  }
});

/* ---------------- SOUND BUTTONS ---------------- */
document.querySelectorAll(".sound-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");

    if (running) {
      if (btn.classList.contains("active"))
        DreamHavenAudio.startSound(btn.dataset.sound);
      else
        DreamHavenAudio.stopSound(btn.dataset.sound);
    }
  });
});

/* ---------------- VOLUME ---------------- */
document.getElementById("volumeSlider").addEventListener("input", e => {
  DreamHavenAudio.setVolume(e.target.value);
});
</script>

</body>
</html>
