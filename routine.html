<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="icon" type="image/png" href="icon_1778321705404.png" />
<link rel="apple-touch-icon" href="icon_1778321705404.png" />
<link rel="manifest" href="manifest.json" />
  <meta charset="UTF-8" />
  <title>Dream Haven – Bedtime Routine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #cfe9ff;          /* pastel blue */
      --card-bg: #fff7c9;     /* pastel yellow */
      --text-dark: #3a3a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .section {
      padding: 1.5rem 1.5rem 2rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .back-link {
      text-decoration: none;
      color: var(--text-dark);
      font-size: 1.4rem;
      font-weight: bold;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card {
      background: var(--card-bg);
      border-radius: 1.4rem;
      border: 2px solid rgba(0,0,0,0.08);
      padding: 1.2rem 1.3rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.7rem;
    }

    label {
      font-size: 0.9rem;
      opacity: 0.8;
      display: block;
      margin-bottom: 0.3rem;
    }

    input, select {
      width: 100%;
      padding: 0.7rem 0.8rem;
      border-radius: 0.7rem;
      border: 2px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.95);
      font-size: 1rem;
      margin-bottom: 0.7rem;
    }

    .small-btn {
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 2px solid #e6d27a;
      background: #fff2a8;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }

    .small-btn:hover {
      background: #ffe98c;
    }

    .habit-list {
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    .habit-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .routine-steps {
      font-size: 1rem;
      line-height: 1.6;
    }

    .notification-preview {
      font-size: 1rem;
      margin-top: 0.8rem;
      padding: 0.8rem;
      border-radius: 1rem;
      background: #fff2a8;
      border: 2px solid #e6d27a;
    }
  </style>
</head>

<body>
  <section class="section">

    <div class="section-header">
      <a href="index.html" class="back-link">←</a>
      <span class="section-title">Bedtime Routine</span>
    </div>

    <div class="card">
      <h3>Your sleep goal</h3>

      <label for="bedtimeInput">Target bedtime (24h, e.g. 23:00)</label>
      <input type="time" id="bedtimeInput" />

      <label for="windDownSelect">Wind-down duration</label>
      <select id="windDownSelect">
        <option value="30">30 minutes</option>
        <option value="45">45 minutes</option>
        <option value="60">60 minutes</option>
        <option value="90">90 minutes</option>
      </select>
    </div>

    <div class="card">
      <h3>Your habits & goals</h3>

      <label for="habitInput">Add a habit (e.g. “Read a book”, “Skincare”, “Stretching”)</label>
      <input type="text" id="habitInput" placeholder="Type a habit and click Add" />

      <button class="small-btn" id="addHabitBtn">Add habit</button>

      <div class="habit-list" id="habitList"></div>
    </div>

    <div class="card">
      <h3>Generated bedtime routine</h3>

      <button class="small-btn" id="generateRoutineBtn">Generate routine</button>

      <div class="routine-steps" id="routineSteps" style="margin-top:0.5rem;"></div>

      <div class="notification-preview" id="notificationPreview" style="display:none;">
        <strong>Notification example:</strong><br>
        Time for bed!! 💤 Sleep well and sweet dreams!! 😊💫🌙☄️🌌
      </div>

      <p style="font-size:0.8rem;opacity:0.7;margin-top:0.4rem;">
        Real notifications now work on supported devices.
      </p>
    </div>

  </section>

  <script>
    /* ---------------- NOTIFICATION PERMISSION ---------------- */
    if ("Notification" in window) {
      Notification.requestPermission();
    }

    function sendRealNotification(message) {
      if (Notification.permission === "granted") {
        new Notification("Dream Haven", {
          body: message,
          icon: "icon_1772044007674.png"
        });
      }
    }

    /* ---------------- HABITS ---------------- */
    const habitInput = document.getElementById('habitInput');
    const addHabitBtn = document.getElementById('addHabitBtn');
    const habitList = document.getElementById('habitList');

    let habits = [];

    function renderHabits() {
      habitList.innerHTML = '';
      if (habits.length === 0) {
        habitList.innerHTML = '<p style="opacity:0.7;">No habits added yet. Add things like reading, journaling, skincare, stretching…</p>';
        return;
      }
      habits.forEach((h, idx) => {
        const div = document.createElement('div');
        div.className = 'habit-item';
        div.innerHTML = `${idx + 1}. ${h}`;
        habitList.appendChild(div);
      });
    }

    addHabitBtn.addEventListener('click', () => {
      const val = habitInput.value.trim();
      if (!val) return;
      habits.push(val);
      habitInput.value = '';
      renderHabits();
    });

    /* ---------------- TIME HELPERS ---------------- */
    function parseTimeToMinutes(t) {
      if (!t) return null;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function minutesToTimeStr(mins) {
      mins = (mins + 24 * 60) % (24 * 60);
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    /* ---------------- ROUTINE GENERATION ---------------- */
    const bedtimeInput = document.getElementById('bedtimeInput');
    const windDownSelect = document.getElementById('windDownSelect');
    const generateRoutineBtn = document.getElementById('generateRoutineBtn');
    const routineSteps = document.getElementById('routineSteps');
    const notificationPreview = document.getElementById('notificationPreview');

    generateRoutineBtn.addEventListener('click', () => {
      const bedtime = parseTimeToMinutes(bedtimeInput.value);
      const windDown = parseInt(windDownSelect.value, 10);

      if (bedtime === null) {
        alert('Please set your target bedtime.');
        return;
      }

      const start = bedtime - windDown;
      let steps = [];

      const baseHabits = habits.length > 0
        ? habits
        : ['Turn off screens', 'Brush teeth', 'Skincare', 'Read a few pages', 'Gratitude journaling'];

      const stepDuration = Math.max(10, Math.floor(windDown / baseHabits.length));
      let currentTime = start;

      baseHabits.forEach(h => {
        const timeStr = minutesToTimeStr(currentTime);
        steps.push(`${timeStr} – ${h}`);
        currentTime += stepDuration;
      });

      steps.push(`${minutesToTimeStr(bedtime)} – Lights off, cozy in bed 💤`);

      routineSteps.innerHTML = steps.map(s => `• ${s}`).join('<br>');
      notificationPreview.style.display = 'block';

      /* REAL NOTIFICATION */
      sendRealNotification("Time for bed!! 💤 Sleep well and sweet dreams!! 😊💫🌙☄️🌌");
    });

    window.addEventListener('load', () => {
      renderHabits();
    });
  </script>
</body>
</html>
